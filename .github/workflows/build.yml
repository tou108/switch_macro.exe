name: Build Switch_macro

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # ── .NET Framework 4.8 is pre-installed on windows-latest ──────
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      # ── Verify required DLLs exist in libs/ ────────────────────────
      - name: Check required DLLs
        shell: pwsh
        run: |
          $required = @(
            "ICSharpCode.AvalonEdit.dll",
            "BZComponent.dll",
            "DirectShowLib-2005.dll",
            "Vortice.XInput.dll",
            "SharpDX.DirectInput.dll",
            "DiscordRPC.dll",
            "RJCP.SerialPortStream.dll",
            "OpenCvSharp.dll",
            "Microsoft.CodeAnalysis.Scripting.dll",
            "Newtonsoft.Json.dll",
            "NxInterface.dll",
            "Suites.Utils.dll",
            "PSTaskDialog.dll",
            "Microsoft.CodeAnalysis.dll",
            "Microsoft.CodeAnalysis.CSharp.Scripting.dll",
            "UrlBase64.dll",
            "OpenCvSharp.Extensions.dll",
            "Microsoft.Scripting.dll"
          )
          $missing = @()
          foreach ($dll in $required) {
            if (-not (Test-Path "libs\$dll")) {
              $missing += $dll
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing required DLLs in libs/:`n$($missing -join "`n")"
            Write-Host "Please copy all DLLs from your NX Macro Controller installation into the libs/ folder."
            exit 1
          }
          Write-Host "All required DLLs found."

      # ── Download IronPython DLL ────────────────────────────────────
      - name: Download IronPython DLL
        shell: pwsh
        run: |
          nuget install IronPython -Version 2.7.12 -OutputDirectory packages -NonInteractive
          $ironPython = Get-ChildItem -Path packages -Filter "IronPython.dll" -Recurse |
            Where-Object { $_.FullName -match "net45" } |
            Select-Object -First 1 -ExpandProperty FullName
          if ($ironPython) {
            Copy-Item $ironPython "libs\IronPython.dll" -Force
            Write-Host "IronPython.dll copied to libs/"
          } else {
            Write-Error "IronPython.dll not found in NuGet package"
            exit 1
          }
          $dynamic = Get-ChildItem -Path packages -Filter "Microsoft.Dynamic.dll" -Recurse |
            Where-Object { $_.FullName -match "net45" } |
            Select-Object -First 1 -ExpandProperty FullName
          if ($dynamic -and -not (Test-Path "libs\Microsoft.Dynamic.dll")) {
            Copy-Item $dynamic "libs\Microsoft.Dynamic.dll" -Force
            Write-Host "Microsoft.Dynamic.dll copied to libs/"
          }

      # ── Download SharpDX core DLL (CS0012対策) ────────────────────
      - name: Download SharpDX core DLL
        shell: pwsh
        run: |
          if (-not (Test-Path "libs\SharpDX.dll")) {
            nuget install SharpDX -Version 4.2.0 -OutputDirectory packages -NonInteractive
            $dll = Get-ChildItem packages -Filter "SharpDX.dll" -Recurse |
              Where-Object { $_.FullName -match "net45|net40|lib" } |
              Select-Object -First 1 -ExpandProperty FullName
            if ($dll) {
              Copy-Item $dll "libs\SharpDX.dll" -Force
              Write-Host "SharpDX.dll copied to libs/"
            } else { Write-Error "SharpDX.dll not found"; exit 1 }
          } else { Write-Host "SharpDX.dll already exists" }

      # ── Patch NxInterface.dll (Mono.Cecil) ────────────────────────
      - name: Patch NxInterface.dll
        shell: pwsh
        run: |
          nuget install Mono.Cecil -Version 0.11.5 -OutputDirectory packages -NonInteractive
          $cecilPath = Get-ChildItem packages -Filter "Mono.Cecil.dll" -Recurse |
            Where-Object { $_.FullName -notmatch "runtimes|contentFiles" } |
            Select-Object -First 1 -ExpandProperty FullName
          Write-Host "Mono.Cecil: $cecilPath"
          Add-Type -Path $cecilPath
          $asm    = [Mono.Cecil.AssemblyDefinition]::ReadAssembly("libs/NxInterface.dll")
          $module = $asm.MainModule
          $obj    = $module.TypeSystem.Object
          $bool   = $module.TypeSystem.Boolean
          $str    = $module.TypeSystem.String
          $void   = $module.TypeSystem.Void
          $fAttr  = [Mono.Cecil.FieldAttributes]::Public -bor [Mono.Cecil.FieldAttributes]::Static
          $mAttr  = [Mono.Cecil.MethodAttributes]::Public -bor [Mono.Cecil.MethodAttributes]::Static
          # ネスト型含む全型を収集
          $allTypes = [System.Collections.Generic.List[object]]::new()
          foreach ($t in $module.Types) {
            $allTypes.Add($t)
            foreach ($nt in $t.NestedTypes) { $allTypes.Add($nt) }
          }
          Write-Host "Total types: $($allTypes.Count)"
          foreach ($type in $allTypes) {
            Write-Host "  $($type.FullName)"
            if ($type.Name -eq "NxControllerInterface") {
              if (-not $type.IsPublic) { $type.IsPublic = $true; Write-Host "Made NxControllerInterface public" }
              @("SerialPort","StartedBluetooth","KeyDataSend") | ForEach-Object {
                $n = $_
                if (-not ($type.Fields | Where-Object { $_.Name -eq $n })) {
                  $ft = if ($n -eq "StartedBluetooth" -or $n -eq "KeyDataSend") { $bool } else { $obj }
                  $type.Fields.Add([Mono.Cecil.FieldDefinition]::new($n, $fAttr, $ft))
                  Write-Host "Added field $n"
                }
              }
              @("ShutdownGamepad","OpenSerial") | ForEach-Object {
                $n = $_
                if (-not ($type.Methods | Where-Object { $_.Name -eq $n })) {
                  $m = [Mono.Cecil.MethodDefinition]::new($n, $mAttr, $void)
                  if ($n -eq "OpenSerial") {
                    $m.Parameters.Add([Mono.Cecil.ParameterDefinition]::new("port", [Mono.Cecil.ParameterAttributes]::None, $str))
                  }
                  $m.Body = [Mono.Cecil.Cil.MethodBody]::new($m)
                  $m.Body.GetILProcessor().Append($m.Body.GetILProcessor().Create([Mono.Cecil.Cil.OpCodes]::Ret))
                  $type.Methods.Add($m)
                  Write-Host "Added method $n"
                }
              }
            }
            if ($type.Name -eq "NxCommand") {
              if (-not $type.IsPublic) { $type.IsPublic = $true; Write-Host "Made NxCommand public" }
              @("LineNotifyToken","CurrentFrame","lockObject") | ForEach-Object {
                $n = $_
                if (-not ($type.Fields | Where-Object { $_.Name -eq $n })) {
                  $ft = if ($n -eq "LineNotifyToken") { $str } else { $obj }
                  $type.Fields.Add([Mono.Cecil.FieldDefinition]::new($n, $fAttr, $ft))
                  Write-Host "Added field $n"
                }
              }
              if (-not ($type.Fields | Where-Object { $_.Name -eq "ExitFlag" })) {
                $type.Fields.Add([Mono.Cecil.FieldDefinition]::new("ExitFlag", $fAttr, $bool))
                Write-Host "Added field ExitFlag"
              }
            }
          }
          $asm.Write("libs/NxInterface_patched.dll")
          $asm.Dispose()
          [GC]::Collect()
          Start-Sleep -Milliseconds 300
          Remove-Item "libs/NxInterface.dll" -Force
          Move-Item "libs/NxInterface_patched.dll" "libs/NxInterface.dll"
          Write-Host "NxInterface.dll patched successfully"

      # ── System.Index/Range polyfill (CS0518対策) ──────────────────
      - name: Add System.Index polyfill
        shell: pwsh
        run: |
          $p  = "namespace System {`n"
          $p += "  internal readonly struct Index {`n"
          $p += "    private readonly int _v;`n"
          $p += "    public Index(int v, bool fromEnd=false){_v=fromEnd?~v:v;}`n"
          $p += "    public static implicit operator Index(int v)=>new Index(v);`n"
          $p += "    public int GetOffset(int len)=>_v<0?len+_v+1:_v;`n"
          $p += "    public bool IsFromEnd=>_v<0;`n"
          $p += "    public int Value=>_v<0?~_v:_v;`n"
          $p += "  }`n"
          $p += "  internal readonly struct Range {`n"
          $p += "    public Index Start{get;}`n"
          $p += "    public Index End{get;}`n"
          $p += "    public Range(Index s,Index e){Start=s;End=e;}`n"
          $p += "    public static Range All=>new Range(new Index(0),new Index(~0));`n"
          $p += "  }`n"
          $p += "}`n"
          Set-Content "SystemIndexPolyfill.cs" $p -Encoding UTF8
          Write-Host "System.Index polyfill created"

      # ── Fix LangVersion (CS1617対策) ──────────────────────────────
      - name: Fix LangVersion in csproj
        shell: pwsh
        run: |
          $content = Get-Content Switch_macro.csproj -Raw
          $content = $content -replace '<LangVersion>[^<]+</LangVersion>', '<LangVersion>preview</LangVersion>'
          Set-Content Switch_macro.csproj $content -Encoding UTF8
          Write-Host "LangVersion -> preview"

      # ── Add WPF references (CS0234対策) ───────────────────────────
      - name: Add WPF references to csproj
        shell: pwsh
        run: |
          $content = Get-Content Switch_macro.csproj -Raw
          if ($content -notmatch 'PresentationFramework') {
            $wpfRefs = '<ItemGroup><Reference Include="PresentationFramework" /><Reference Include="PresentationCore" /><Reference Include="WindowsBase" /><Reference Include="System.Xaml" /></ItemGroup>'
            $content = $content -replace '</Project>', "$wpfRefs`n</Project>"
            Set-Content Switch_macro.csproj $content -Encoding UTF8
            Write-Host "WPF references added"
          } else {
            Write-Host "PresentationFramework already referenced"
          }

      # ── Restore & Build ────────────────────────────────────────────
      - name: Restore NuGet packages
        run: nuget restore Switch_macro.csproj

      - name: Build Release (x64)
        run: |
          msbuild Switch_macro.csproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:OutputPath=bin\Release\ `
            /m

      # ── Rename output exe ──────────────────────────────────────────
      - name: Verify output exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path bin\Release -Filter "Switch_macro.exe" -Recurse | Select-Object -First 1
          if ($null -eq $exe) {
            Write-Error "Switch_macro.exe not found in bin\Release\"
            exit 1
          }
          Write-Host "Build succeeded: $($exe.FullName) ($([math]::Round($exe.Length/1KB, 1)) KB)"

      # ── Upload artifact ────────────────────────────────────────────
      - name: Upload Switch_macro.exe
        uses: actions/upload-artifact@v4
        with:
          name: Switch_macro-${{ github.sha }}
          path: |
            bin/Release/Switch_macro.exe
            libs/
          retention-days: 30

      # ── Create release on tag push ─────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/Release/Switch_macro.exe
          generate_release_notes: true
