name: Build Switch_macro

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # ── .NET Framework 4.8 is pre-installed on windows-latest ──────
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      # ── Verify required DLLs exist in libs/ ────────────────────────
      - name: Check required DLLs
        shell: pwsh
        run: |
          $required = @(
            "ICSharpCode.AvalonEdit.dll",
            "BZComponent.dll",
            "DirectShowLib-2005.dll",
            "Vortice.XInput.dll",
            "SharpDX.DirectInput.dll",
            "DiscordRPC.dll",
            "RJCP.SerialPortStream.dll",
            "OpenCvSharp.dll",
            "Microsoft.CodeAnalysis.Scripting.dll",
            "Newtonsoft.Json.dll",
            "NxInterface.dll",
            "Suites.Utils.dll",
            "PSTaskDialog.dll",
            "Microsoft.CodeAnalysis.dll",
            "Microsoft.CodeAnalysis.CSharp.Scripting.dll",
            "UrlBase64.dll",
            "OpenCvSharp.Extensions.dll",
            "Microsoft.Scripting.dll"
          )
          $missing = @()
          foreach ($dll in $required) {
            if (-not (Test-Path "libs\$dll")) {
              $missing += $dll
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing required DLLs in libs/:`n$($missing -join "`n")"
            Write-Host "Please copy all DLLs from your NX Macro Controller installation into the libs/ folder."
            exit 1
          }
          Write-Host "All required DLLs found."

      # ── Download IronPython DLL ────────────────────────────────────
      - name: Download IronPython DLL
        shell: pwsh
        run: |
          nuget install IronPython -Version 2.7.12 -OutputDirectory packages -NonInteractive
          $ironPython = Get-ChildItem -Path packages -Filter "IronPython.dll" -Recurse |
            Where-Object { $_.FullName -match "net45" } |
            Select-Object -First 1 -ExpandProperty FullName
          if ($ironPython) {
            Copy-Item $ironPython "libs\IronPython.dll" -Force
            Write-Host "IronPython.dll copied to libs/"
          } else {
            Write-Error "IronPython.dll not found in NuGet package"
            exit 1
          }
          $dynamic = Get-ChildItem -Path packages -Filter "Microsoft.Dynamic.dll" -Recurse |
            Where-Object { $_.FullName -match "net45" } |
            Select-Object -First 1 -ExpandProperty FullName
          if ($dynamic -and -not (Test-Path "libs\Microsoft.Dynamic.dll")) {
            Copy-Item $dynamic "libs\Microsoft.Dynamic.dll" -Force
            Write-Host "Microsoft.Dynamic.dll copied to libs/"
          }

      # ── Patch NxInterface.dll ─────────────────────────────────────
      # NxControllerInterface を internal→public に変更
      # NxCommand.LineNotifyToken フィールドを追加
      - name: Patch NxInterface.dll
        shell: pwsh
        run: |
          $ildasm = Get-ChildItem "C:\Program Files (x86)\Microsoft SDKs" -Filter "ildasm.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -Last 1 -ExpandProperty FullName
          $ilasm  = Get-ChildItem "C:\Windows\Microsoft.NET" -Filter "ilasm.exe" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match "64" } | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "ildasm: $ildasm"
          Write-Host "ilasm : $ilasm"
          & $ildasm "libs\NxInterface.dll" /out:NxInterface.il /nobar
          if (-not (Test-Path NxInterface.il)) { Write-Error "Disassembly failed"; exit 1 }
          $il = Get-Content NxInterface.il -Raw -Encoding UTF8
          $il = $il -replace '(\.class\s+)private(\s+auto\s+ansi\s+.*?NxControllerInterface)', '$1public$2'
          $il = $il -replace '(\.class\s+)private(\s+auto\s+ansi\s+.*?\bNxCommand\b)', '$1public$2'
          if ($il -notmatch 'LineNotifyToken') {
            $il = $il -replace '(} // end of class NxCommand)', "  .field public static string LineNotifyToken`n  `$1"
            Write-Host "Added LineNotifyToken to NxCommand"
          }
          Set-Content NxInterface.il $il -Encoding UTF8
          & $ilasm "NxInterface.il" /dll /output:"libs\NxInterface.dll" /nologo
          Write-Host "NxInterface.dll patched"

      # ── Fix LangVersion (CS1617対策) ──────────────────────────────
      - name: Fix LangVersion in csproj
        shell: pwsh
        run: |
          $content = Get-Content Switch_macro.csproj -Raw
          $content = $content -replace '<LangVersion>[^<]+</LangVersion>', '<LangVersion>preview</LangVersion>'
          Set-Content Switch_macro.csproj $content -Encoding UTF8
          Write-Host "LangVersion -> preview"

      # ── Add WPF references (CS0234対策) ───────────────────────────
      - name: Add WPF references to csproj
        shell: pwsh
        run: |
          $content = Get-Content Switch_macro.csproj -Raw
          if ($content -notmatch 'PresentationFramework') {
            $wpfRefs = '<ItemGroup><Reference Include="PresentationFramework" /><Reference Include="PresentationCore" /><Reference Include="WindowsBase" /><Reference Include="System.Xaml" /></ItemGroup>'
            $content = $content -replace '</Project>', "$wpfRefs`n</Project>"
            Set-Content Switch_macro.csproj $content -Encoding UTF8
            Write-Host "WPF references added"
          } else {
            Write-Host "PresentationFramework already referenced"
          }

      # ── Restore & Build ────────────────────────────────────────────
      - name: Restore NuGet packages
        run: nuget restore Switch_macro.csproj

      - name: Build Release (x64)
        run: |
          msbuild Switch_macro.csproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:OutputPath=bin\Release\ `
            /m

      # ── Rename output exe ──────────────────────────────────────────
      - name: Verify output exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path bin\Release -Filter "Switch_macro.exe" -Recurse | Select-Object -First 1
          if ($null -eq $exe) {
            Write-Error "Switch_macro.exe not found in bin\Release\"
            exit 1
          }
          Write-Host "Build succeeded: $($exe.FullName) ($([math]::Round($exe.Length/1KB, 1)) KB)"

      # ── Upload artifact ────────────────────────────────────────────
      - name: Upload Switch_macro.exe
        uses: actions/upload-artifact@v4
        with:
          name: Switch_macro-${{ github.sha }}
          path: |
            bin/Release/Switch_macro.exe
            libs/
          retention-days: 30

      # ── Create release on tag push ─────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/Release/Switch_macro.exe
          generate_release_notes: true
